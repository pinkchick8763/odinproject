<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Four Game</title>
    <link rel="stylesheet" href="connectFour.css">
</head>
<body>

    <div class="container">
        <h1 class="turn"></h1>
        <div class="board"></div>
    </div>

    <div class="message-box">
        <div class="message"></div>
    </div>

    <div class="play-information">
        <div>
            <label for="play1">Play one's name :</label>
            <input type="text" id="play1" name="play1" placeholder="Input your name">
        </div>
        <div>
            <label for="play2">Play two's name :</label>
            <input type="text" id="play2" name="play2" placeholder="Input your name">
        </div>
        <button class="start-btn">Let's start</button>
    </div>

    <div class="result-box">
        <div class="result"></div>
        <div class="again">Do you want to play again?</div>
        <button class="restart-btn">Restart game</button>
    </div>
    
    <script src="test.js"></script>
    
</body>
</html>
