<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Center</title>
    <style>
        .container {
            background: skyblue;
            border: 3px solid blue;
            width: 100%;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .items {
            background: peachpuff;
            border: 3px solid hotpink;
            width: 300px;
            height: 300px;

            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="items">
            <p>center this div</p>
        </div>
    </div>

</body>
</html>
