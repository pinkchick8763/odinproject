<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header 2</title>
    <style>

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        ul {
            display: flex;
            gap: 15px;

            padding: 0 20px;
            text-decoration: none;
            list-style-type: none;
        }

        span {
            background: purple;
            border-radius: 50%;
            width: 50px;
            height: 50px;
        }

    </style>

</head>
<body>
    
    <div class="header">
        <div class="nav-left">
            <div class="logo">
                <h1>Logo</h1>
            </div>
            <ul>
                <li><a href="#">link-one</a></li>
                <li><a href="#">link-two</a></li>
                <li><a href="#">link-three</a></li>
            </ul>
        </div>

        
        <div class="nav-right">
            <a href="#" class="btn">1 new notification</a>
            <span class="user"></span>
        </div>
    </div>


</body>
</html>
