<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid flex of length</title>

    <style>

        body {
            padding-top: 40px;
            background: #f5f7f8;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 50px 2fr 20%;
            grid-template-rows: auto auto auto;
            gap: 5px;
        }

        .items {
            background: skyblue;
            font-size: 18px;
            padding: 18px;
        }


    </style>

</head>
<body>

    <div class="container">
        <div class="items">1</div>
        <div class="items">1</div>
        <div class="items">1</div>
        <div class="items">1</div>
        
        <div class="items">2</div>
        <div class="items">2</div>
        <div class="items">2</div>
        <div class="items">2</div>

        <div class="items">3</div>
        <div class="items">3</div>
        <div class="items">3</div>
        <div class="items">3</div>
    </div>
    
</body>
</html>
