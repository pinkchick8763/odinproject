<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/pj_signUpForm.css">
    <title>Project Sign-up Form</title>
</head>
<body>

    
    <div class="main-image-box">
        <header>
            <h1>ODIN</h1>
        </header>

        <footer>
            Photo by &nbsp;<a href="">Halie West</a>&nbsp; on &nbsp;<a href="">Unsplash</a>
        </footer>
        <!-- footer 內的anchor 不會被空白鍵分隔，因此使用 &nbsp -->
    </div>

    <div class="form-box">
        <section>
            <article>
                <h2>This is not a real online service! You knoe you need something like
                    this in your life to help you realize your deepest dreams.
                </h2>
                <h2>Sign up now to get started.</h2>
                <br>
                <h2>You know you want to.</h2>
            </article>
        </section>

        <main>
            <h2>Let's do this!</h2>
            <form action="" class="form-container">

                <div class="form-group">
                    <label for="firstname">FIRST NAME</label>
                    <input type="text" id="firstname" name="firstname" placeholder="Please input your first name..." required>
                </div>

                <div class="form-group">
                    <label for="lastname">LAST NAME</label>
                    <input type="text" id="lastname" name="lastname" placeholder="Please input your last name..." required>
                </div>
                
                <div class="form-group">
                    <label for="email">EMAIL</label>
                    <input type="email" id="email" name="email" placeholder="ex :123@gmail..." required>
                </div>
                
                <div class="form-group">
                    <label for="phone">PHONE NUMBER</label>
                    <input type="text" id="phone" name="phone" pattern="[0-9]{10}" placeholder="input your phone of not zip" required>
                </div>
                
                <div class="form-group">
                    <label for="pw">PASSWORD</label>
                    <input type="password" id="pw" name="pw" pattern="[a-zA-Z0-9]{8, 16}" placeholder="least 8 letters or numbers" required>
                </div>
                
                <div class="form-group">
                    <label for="confirem">CONFIREM PASSWORD</label>
                    <input type="password" id="confirem" name="confirem" pattern="[a-zA-Z0-9]{8, 16}" placeholder="Please check out your password again" required>
                </div>
                
            </form>
        </main>

            <button class="account">Create Account</button>
            <p>Already have an account? &nbsp;<a href="">Log in</a></p>
    </div>

</body>
</html>
